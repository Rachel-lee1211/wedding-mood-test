 {t:'드레스 투어 첫날, 거울 앞에 선 순간 “이 모습이면 바로 계약할 것 같다” 싶은 장면은?',multi:false,c:[['왕실의 여왕 같은 모습 — 고급스럽고 품격 있는 존재감',{CRSB:2,CMPB:2}],['동화 속 공주 같은 모습 — 풍성하고 로망 가득한 분위기',{CRPF:2,CRPB:2}],['레드카펫 스타 같은 모습 — 화려하고 시선을 사로잡는 분위기',{GRPB:2,GRSB:2,GMPB:1}],['첫사랑 같은 모습 — 청순하고 사랑스러운 분위기',{GRPF:2,GRSF:2,CMPF:2,CRSF:1}],['패션쇼 모델 같은 모습 — 세련되고 감각적인 분위기',{CMSF:2,CMSB:2,GMSF:1}]]},
 {t:'드레스 투어를 단 1곳만 갈 수 있다면?',multi:false,c:[['고급스러운 실크 드레스가 유명한 곳',{CRSB:2,CMPB:3,CMSF:1}],['풍성한 공주 드레스가 유명한 곳',{CRPF:3,CRPB:2}],['비즈와 반짝임이 유명한 곳',{GRPB:3,GRSB:2,GMPB:1}],['플라워와 로맨틱 무드가 유명한 곳',{GRPF:3,GRSF:2,CMPF:2,GMPF:1}],['세련된 핏과 패션감이 유명한 곳',{CMSB:3,GMSF:2,CMSF:1}]]},
 {t:'가장 끌리는 소재/디테일은?',hint:'최대 2개까지 선택 가능',multi:true,max:2,c:[['미카도 실크',{CRSB:4,CMPB:4,CMSF:2}],['오간자',{CRPF:4,CRPB:2,GRPF:2}],['맑은 비즈',{GRPB:4,CRPB:3}],['플라워 아플리케',{GRPF:4,GRSF:3,GMPF:2}],['실버 비즈',{GRSB:4,GMPB:3,GRPB:1}],['글리터·스팽글',{GMPB:4,GMSB:2,GRSB:2}]]},
 {t:'드레스 볼륨은?',multi:false,c:[['A라인',{CRSB:2,CMSF:1,GRSF:1}],['풍성 A라인',{CRPF:2,CRPB:2,GRPF:1}],['벨라인',{CRPF:3,CRPB:2,GRPB:1}],['머메이드',{GMSF:3,CMSB:2,GMPB:1}],['엠파이어 라인',{CRSF:2,GRSF:2,CMPF:2,GMPF:1}]]},
 {t:'드레스를 볼 때 가장 먼저 보는 부분은?',multi:false,c:[['원단의 고급스러움',{CMPB:3,CRSB:2}],['스커트 볼륨',{CRPF:3,CRPB:2}],['반짝임과 비즈',{GRPB:3,GRSB:2}],['레이스·플라워 디테일',{GRPF:3,GRSF:2,CMPF:2}],['전체적인 라인과 핏',{CMSB:3,GMSF:2,CMSF:1}]]},
 {t:'가장 끌리는 상체 디자인은?',multi:false,c:[['스퀘어넥',{CRSB:2,CMSF:1,CMPB:1}],['탑드레스',{CRPF:2,GRPB:2,CRPB:1}],['오프숄더',{GRPF:2,GRSF:2,CRPF:1}],['드레이프넥',{CMPB:2,CRSB:1,GMPF:1}],['딥브이넥',{GMSF:2,GMPB:2,CMSB:1}]]},
 {t:'드레스에서 가장 중요한 것은?',multi:false,c:[['품격',{CMPB:3,CRSB:2}],['로망',{CRPF:3,CRPB:2}],['화려함',{GRSB:3,GRPB:2,GMPB:1}],['사랑스러움',{GRPF:2,GRSF:2,CMPF:2,CRSF:1}],['세련미',{CMSB:3,CMSF:2,GMSF:1}]]},
 {t:'본식 홀 분위기는 어떤가요?',multi:false,c:[['클래식 호텔 예식장',{CMPB:2,GRSB:3,GMSB:2,CRSB:1}],['어두운 홀',{GRPB:3,GRSB:3,GMPB:2,GMSB:1}],['밝은 홀',{CRSB:2,CRSF:2,GRPF:2,CMSF:1}],['야외 예식 또는 채플 예식',{GRPF:3,CRSF:2,GRSF:2,GMPF:1}],['아직 정하지 못했다',{}]]},
 {t:'예산 제한 없이 딱 하나만 업그레이드할 수 있다면?',multi:false,c:[['최고급 미카도 실크',{CMPB:3,CRSB:3}],['더욱 풍성한 스커트',{CRPF:3,CRPB:2}],['수작업 비즈 추가',{GRPB:3,GRSB:2,GMPB:1}],['플라워 아플리케 추가',{GRPF:3,GRSF:2,CMPF:2,GMPF:1}],['완벽한 맞춤 핏',{CMSB:3,GMSF:2,CMSF:1}]]},
 {t:'드레스 투어 후 가장 후회할 것 같은 상황은?',multi:false,c:[['미카도 실크 드레스를 안 입어본 것',{CRSB:3,CMPB:3}],['풍성한 드레스를 안 입어본 것',{CRPF:3,CRPB:2}],['반짝이는 드레스를 안 입어본 것',{GRPB:3,GRSB:2,GMPB:1}],['플라워 드레스를 안 입어본 것',{GRPF:3,GRSF:2,CMPF:2}],['머메이드 드레스를 안 입어본 것',{GMSF:4,CMSB:2}]]},
 {t:'드레스 투어 마지막 날, 최종 선택 직전이라면 무엇 때문에 가장 고민될 것 같나요?',multi:false,c:[['실크의 고급스러움',{CMPB:4,CRSB:3}],['풍성한 공주 무드',{CRPF:4,CRPB:3}],['반짝이는 비즈',{GRPB:4,GRSB:3,GMPB:1}],['플라워 디테일',{GRPF:4,GRSF:3,CMPF:2,GMPF:1}],['세련된 핏',{CMSB:4,GMSF:3,CMSF:1}]]}
]; // 수정
let current=0, answers=Array(questions.length).fill(null);
function startTest(){document.getElementById('intro').style.display='none';document.getElementById('test').style.display='block';renderQ()}
function formatChoice(text){
 const parts=text.split(' — ');
 if(parts.length>1){return `<div class="choice-title">${parts[0]}</div><div class="choice-desc">${parts.slice(1).join(' — ')}</div>`}
 return `<div class="choice-title">${text}</div>`
}
function renderQ(){const q=questions[current];document.getElementById('prog').style.width=((current)/questions.length*100)+'%';let html=`<div class="qcard active"><div class="qnum">Q${current+1} / ${questions.length}</div><div class="qtitle">${q.t}</div>${q.hint?`<div class="hint">${q.hint}</div>`:''}<div class="choices">`;q.c.forEach((x,i)=>{let sel=q.multi?(answers[current]||[]).includes(i):answers[current]===i;html+=`<div class="choice ${sel?'selected':''}" onclick="selectChoice(${i})">${formatChoice((i+1)+'. '+x[0])}</div>`});html+=`</div><div class="nav"><button class="btn secondary" onclick="prevQ()" ${current===0?'disabled':''}>이전</button><button class="btn" onclick="nextQ()" ${answers[current]===null || (Array.isArray(answers[current])&&answers[current].length===0)?'disabled':''}>${current===questions.length-1?'결과 보기':'다음'}</button></div></div>`;document.getElementById('questionArea').innerHTML=html}
function selectChoice(i){const q=questions[current];if(q.multi){let arr=answers[current]||[];if(arr.includes(i)) arr=arr.filter(v=>v!==i); else {if(arr.length>=q.max){alert(`최대 ${q.max}개까지 선택할 수 있어요.`);return} arr=[...arr,i]} answers[current]=arr}else{answers[current]=i}renderQ()}
function prevQ(){if(current>0){current--;renderQ()}}
function nextQ(){if(current<questions.length-1){current++;renderQ()}else showResult()}
function addScore(score,obj){Object.entries(obj).forEach(([k,v])=>score[k]=(score[k]||0)+v)}
function showResult(){let score={};Object.keys(types).forEach(k=>score[k]=0);answers.forEach((ans,qi)=>{const q=questions[qi];if(Array.isArray(ans)) ans.forEach(i=>addScore(score,q.c[i][1])); else addScore(score,q.c[ans][1])});let best=Object.entries(score).sort((a,b)=>b[1]-a[1])[0][0];renderResult(best,score)}
function axisScores(score){
 const axes=[
  {title:'축1 · Classic ↔ Glam',left:'C',right:'G',leftName:'Classic · 여왕형',rightName:'Glam · 스타형'},
  {title:'축2 · Romantic ↔ Modern',left:'R',right:'M',leftName:'Romantic · 공주/첫사랑형',rightName:'Modern · 패션형'},
  {title:'축3 · Princess ↔ Slim',left:'P',right:'S',leftName:'Princess · 풍성',rightName:'Slim · 슬림'},
  {title:'축4 · Flower ↔ Beads',left:'F',right:'B',leftName:'Flower · 플라워',rightName:'Beads · 비즈'}
 ];
 return axes.map(ax=>{
  let l=0,r=0;
  Object.entries(score).forEach(([code,val])=>{
   if(code.includes(ax.left)) l+=val;
   if(code.includes(ax.right)) r+=val;
  });
  let total=l+r||1;
  let lp=Math.round(l/total*100); let rp=100-lp;
  return {...ax,lp,rp};
 });
}
function axisBar(ax){
 // CLAUDE 오류: 이전에 axis-fill-left만 항상 사용 → rp > lp일 때 오른쪽이 우세한데 왼쪽 lp% 로 채워 게이지 방향이 반대로 표현됨
 // CODEX 수정: 우세한 쪽에 따라 left/right fill 방향을 분기
 const fill=ax.lp>=ax.rp
  ? `<div class="axis-fill-left" style="width:${ax.lp}%"></div>`
  : `<div class="axis-fill-right" style="width:${ax.rp}%"></div>`;
 return `<div class="axis-card"><div class="axis-title">${ax.title}</div><div class="axis-head"><div><div class="axis-pct">${ax.lp}%</div><div class="axis-name">${ax.leftName}</div></div><div style="text-align:right"><div class="axis-pct">${ax.rp}%</div><div class="axis-name">${ax.rightName}</div></div></div><div class="axis-track">${fill}</div><div class="axis-foot"><span class="axis-code">${ax.left}</span><span class="axis-code">${ax.right}</span></div></div>`;
}
// CODEX: 결과 페이지에 TOP3 적합도와 추천 홀/소재/실루엣을 명시합니다.
function resultDetails(code,t){
 const silhouettes={P:'풍성 A라인 · 벨라인',S:'슬림 A라인 · 머메이드'};
 return {hall:t.hall,material:t.tags.slice(0,2).join(' · '),silhouette:silhouettes[code[2]]||'체형 맞춤 실루엣'};
}
function shopCard(name,rank,fit){const s=shops[name]||{};let links='';if(s.home)links+=`<a class="linkbtn" target="_blank" href="${s.home}">공식 홈페이지</a>`;if(s.insta)links+=`<a class="linkbtn insta" target="_blank" href="${s.insta}">공식 인스타그램</a>`;return `<div class="shop"><div class="shop-top"><div><div class="rank">${rank}</div><div class="shop-name">${name}</div></div><div class="shop-fit">${fit}%</div></div><div class="links">${links||'<span class="small">공식 채널 확인 중</span>'}</div></div>`}
function renderResult(code,score){document.getElementById('test').style.display='none';const t=types[code];const details=resultDetails(code,t);let bars=axisScores(score).map(axisBar).join('');let shopHtml=shopCard(t.main,'TOP 1',96)+t.subs.map((s,i)=>shopCard(s,`TOP ${i+2}`,i===0?91:87)).join('');document.getElementById('result').className='result show';document.getElementById('result').innerHTML=`<div class="result-card"><div class="type-code">${code}</div><div class="type-name">${t.name}</div><div class="mood">${t.mood}</div><p class="desc">${t.desc}</p><div class="result-meta"><span class="tag">추천 홀: ${details.hall}</span><span class="tag">추천 소재: ${details.material}</span><span class="tag">추천 실루엣: ${details.silhouette}</span></div><div class="tags">${t.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div><h3>4축 성향 분석</h3><div class="bars">${bars}</div><h3>추천 드레스샵 TOP3</h3><div class="shops">${shopHtml}</div><div class="footer-actions"><button class="btn" onclick="location.reload()">다시 테스트하기</button></div><p class="small">결과는 취향 기반 추천이며, 실제 피팅 결과·예식장 조명·체형·예산에 따라 달라질 수 있어요.</p></div>`;window.scrollTo({top:0,behavior:'smooth'})}
</script>
