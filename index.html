<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" /><!-- CLAUDE: 검색엔진 인덱싱/크롤링 차단 -->
  <title>웨딩 드레스 유형 테스트</title>
  <style>
    :root{--bg:#fff8fa;--card:#fff;--ink:#2d2328;--muted:#75666e;--accent:#d88da8;--accent2:#f3d4df;--line:#f0dce4;--dark:#8f5270}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:linear-gradient(180deg,#fff8fa,#fff);color:var(--ink);user-select:none;-webkit-user-select:none}/* CLAUDE: 텍스트 선택 차단 */
    input,textarea{user-select:text;-webkit-user-select:text}/* CLAUDE: 입력창은 선택 허용 */
    .wrap{max-width:920px;margin:0 auto;padding:34px 16px 70px}
    .hero{padding:34px 24px;border:1px solid var(--line);background:#fff;border-radius:28px;box-shadow:none;border-color:#f0d9e2}
    h1{font-size:32px;line-height:1.15;margin:0 0 12px}
    .sub{color:var(--muted);line-height:1.7;margin:0}
    .badge{display:inline-flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:999px;color:var(--dark);font-weight:700;margin-bottom:16px}
    .section{margin-top:22px}
    .progress{height:8px;background:#f6e8ee;border-radius:999px;overflow:hidden;margin:0 0 28px}
    .progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#d88da8,#b7648d);transition:.25s}
    .qcard{padding:0;border:0;background:transparent;border-radius:0}
    .qnum{font-size:15px;color:#b05f83;font-weight:900;margin-bottom:10px}
    .qtitle{font-size:34px;line-height:1.35;letter-spacing:-.04em;margin:0 0 34px;color:#191519;font-weight:950;word-break:keep-all}
    .hint{display:inline-block;margin:-18px 0 22px;padding:8px 12px;border-radius:999px;background:#fff3f7;border:1px solid #f0d9e2;color:#9a5574;font-weight:800;font-size:14px}
    .choices{display:grid;gap:14px}
    .choice{border:1.5px solid #f2dfe6;border-radius:18px;padding:20px 18px;background:#fff;cursor:pointer;transition:.15s;line-height:1.55;min-height:68px;display:flex;flex-direction:column;justify-content:center;gap:6px}
    .choice:hover{border-color:#d88da8;background:#fffafa}
    .choice.selected{background:#fff1f6;border-color:#d88da8;box-shadow:0 8px 26px rgba(216,141,168,.15)}
    .choice-title{font-size:17px;font-weight:950;color:#171317;letter-spacing:-.02em}
    .choice-desc{font-size:14px;color:#6d6067;font-weight:600}
    .nav{display:flex;gap:10px;margin-top:20px;justify-content:flex-start}
    .btn{appearance:none;border:0;border-radius:999px;padding:13px 18px;background:#e2adc0;color:#fff;font-weight:900;cursor:pointer;font-size:15px}
    .btn.secondary{background:#fff;color:#ca8da6;border:1px solid #f2dfe6}
    .btn:disabled{opacity:.45;cursor:not-allowed;background:#f7edf1;color:#ca9caf}
    .nickname-wrap{margin-top:20px}.nickname-label{font-size:15px;font-weight:800;color:#4a3b43;margin:0 0 10px;display:block}/* CLAUDE */
    .nickname-row{display:flex;gap:10px;flex-wrap:wrap}/* CLAUDE */
    .nickname-input{flex:1;min-width:0;border:1.5px solid #f2dfe6;border-radius:999px;padding:13px 18px;font-size:15px;font-weight:700;color:#171317;outline:none;transition:.15s;font-family:inherit;background:#fff}/* CLAUDE */
    .nickname-input:focus{border-color:#d88da8;background:#fffafa}/* CLAUDE */
    .nickname-input.error{border-color:#e05c7a;animation:shake .2s}/* CLAUDE */
    @keyframes shake{0%,100%{transform:translateX(0)}33%{transform:translateX(-6px)}66%{transform:translateX(6px)}}/* CLAUDE */
    .result{display:none}
    .result.show{display:block}
    .result-card{padding:26px;border:1px solid #f0d9e2;background:#fff;border-radius:28px}
    /* CLAUDE: 결과 헤더 — 데스크탑: 텍스트 좌측 + 이미지 우측, 모바일: 이미지 중앙 상단 */
    .result-header{display:flex;gap:20px;align-items:flex-start;margin-bottom:4px}
    .result-header-text{flex:1;min-width:0}
    .result-img{width:200px;height:260px;object-fit:cover;border-radius:20px;flex-shrink:0}
    .type-name{font-size:34px;margin:4px 0 8px;font-weight:950}
    .mood{font-size:18px;font-weight:900;margin-bottom:8px}
    .desc{color:var(--muted);line-height:1.7;margin:0 0 8px}
    /* CODEX: CLAUDE 결과 화면에는 필수 항목인 4축 바와 추천 홀/소재/실루엣 요약이 빠져 있었습니다. */
    .result-meta{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 6px}
    .bars{display:grid;gap:18px;margin:18px 0 22px}
    .axis-card{border-top:1px solid #eee4e8;padding:18px 0 0}
    .axis-title{font-size:16px;font-weight:950;color:#3e3740;margin-bottom:10px;text-align:center}
    .axis-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;gap:12px}
    .axis-pct{font-size:20px;font-weight:950;color:#30272c}
    .axis-name{font-size:13px;color:var(--muted);font-weight:800}
    .axis-track{position:relative;height:12px;border-radius:999px;background:#f7edf1;overflow:hidden}
    .axis-fill-left{position:absolute;left:0;top:0;height:100%;border-radius:999px 0 0 999px;background:#70a9bd}
    .axis-fill-right{position:absolute;top:0;height:100%;border-radius:0 999px 999px 0;background:#70a9bd}/* CLAUDE: right:0 제거 — iOS Safari 버그 대응, left:lp% 인라인 처리 */
    .axis-card:nth-child(2) .axis-fill-left,.axis-card:nth-child(2) .axis-fill-right{background:#d7a737}
    .axis-card:nth-child(3) .axis-fill-left,.axis-card:nth-child(3) .axis-fill-right{background:#62a77b}
    .axis-card:nth-child(4) .axis-fill-left,.axis-card:nth-child(4) .axis-fill-right{background:#8e6aaa}
    .axis-foot{display:flex;justify-content:space-between;margin-top:7px}
    .axis-code{font-size:12px;font-weight:950;color:var(--dark)}
    /* CLAUDE: 드레스 DNA 태그 영역 */
    .dna-section{margin:20px 0}
    .dna-title{font-size:15px;font-weight:900;color:#4a3b43;margin:0 0 12px}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{font-size:13px;background:#fff3f7;color:#8f5270;border:1px solid var(--line);padding:6px 9px;border-radius:999px}
    /* CLAUDE: 추천 드레스샵 카드 */
    .shops{display:grid;gap:14px;margin-top:12px}
    .shop{border:1px solid var(--line);border-radius:22px;padding:18px;background:#fffdfd}
    .shop-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .rank{font-size:13px;color:var(--dark);font-weight:900}
    .shop-name{font-size:21px;font-weight:950}
    .shop-fit{font-size:20px;font-weight:950;color:#b05f83;white-space:nowrap}
    .links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .linkbtn{display:inline-block;text-decoration:none;background:#2d2328;color:#fff;padding:9px 12px;border-radius:999px;font-size:13px;font-weight:900}
    .linkbtn.insta{background:#c4648e}
    .small{font-size:13px;color:var(--muted);line-height:1.6}
    .footer-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
    .version{position:fixed;bottom:10px;right:14px;font-size:11px;color:#c9b0bb;font-weight:600;letter-spacing:.04em;pointer-events:none}
    /* CODEX: 모바일에서 축 라벨, 긴 샵 이름, 질문 제목이 서로 밀리지 않도록 반응형 여유를 보강합니다. */
    @media(max-width:620px){
      h1{font-size:26px}.type-name{font-size:28px}
      .wrap{padding:24px 16px 50px}
      .hero,.result-card{border-radius:22px;padding:20px}
      .qtitle{font-size:28px;letter-spacing:0}
      .choice{min-height:72px;padding:16px}
      .choice-title{font-size:16px}.choice-desc{font-size:13px}
      /* CLAUDE: 모바일에서 결과 이미지 중앙 배치 */
      .result-header{flex-direction:column;align-items:center}
      .result-header-text{width:100%;text-align:left}
      .result-img{width:100%;max-width:340px;height:auto;aspect-ratio:3/4}
      .axis-head{align-items:flex-start}
      .axis-name{font-size:12px;line-height:1.35;max-width:130px}
      .axis-pct{font-size:18px}
      .shop-top{align-items:flex-start}
      .shop-name{font-size:19px;line-height:1.3;word-break:keep-all;overflow-wrap:anywhere}
      .shop-fit{font-size:18px}
    }
    @media(max-width:380px){
      .axis-head{display:grid;grid-template-columns:1fr;gap:8px}
      .axis-head>div:last-child{text-align:left!important}
      .axis-name{max-width:none}
      .shop-top{display:grid;grid-template-columns:1fr;gap:8px}
      .shop-fit{justify-self:start}
    }
  </style>
</head>

<div class="wrap">

    <div class="badge">💍 16가지 웨딩 드레스 유형 테스트</div>

    <div class="section nickname-wrap"><!-- CLAUDE: 닉네임 입력 후 테스트 시작 -->

// CLAUDE: 태그 → 한글 라벨 매핑

let current=0,answers=Array(questions.length).fill(null);
let userNickname='';// CLAUDE
const SHEET_URL='https://script.google.com/macros/s/AKfycbxa_TCeM01b6j3ViaSgGDSHYR7MmZ7ML6irmSwgsvKIRC6K8vaagQKw2FBXknRjfl58/exec';// CLAUDE
function submitNickname(){// CLAUDE: 닉네임 수집 후 구글 시트 저장, 테스트 시작
  const el=document.getElementById('nicknameInput');
  const val=el.value.trim();
  if(!val){el.classList.add('error');el.focus();setTimeout(()=>el.classList.remove('error'),300);return;}
  userNickname=val;// 닉네임 저장만, 전송은 퀴즈 완료 후
  startTest();
}

function startTest(){
  document.getElementById('intro').style.display='none';
  document.getElementById('test').style.display='block';
  renderQ();
}

// CLAUDE: 새 질문 렌더러 — label/desc 분리 포맷 사용
function renderQ(){
  const q=questions[current];
  // CODEX: CLAUDE 오류 — (current/questions.length*100) → Q1에서 0%, 마지막 문항에서 (n-1)/n% 로 100%에 미달
  // CODEX 수정: (current+1)/questions.length*100 으로 각 문항 진입 시 해당 단계 % 표시
  document.getElementById('prog').style.width=((current+1)/questions.length*100)+'%';
  const isMulti=q.type==='multi';
  let html=`<div class="qcard"><div class="qnum">Q${current+1} / ${questions.length}</div><div class="qtitle">${q.t}</div>`;
  if(q.hint) html+=`<div class="hint">${q.hint}</div>`;
  html+=`<div class="choices">`;
  q.c.forEach((opt,i)=>{
    const sel=isMulti?(answers[current]||[]).includes(i):answers[current]===i;
    html+=`<div class="choice ${sel?'selected':''}" onclick="selectChoice(${i})">`;
    html+=`<div class="choice-title">${i+1}. ${opt.label}</div>`;
    if(opt.desc) html+=`<div class="choice-desc">${opt.desc}</div>`;
    html+=`</div>`;
  });
  const answered=isMulti?(answers[current]||[]).length>0:(answers[current]!==null&&answers[current]!==undefined);
  html+=`</div><div class="nav">`;
  html+=`<button class="btn secondary" onclick="prevQ()" ${current===0?'disabled':''}>이전</button>`;
  html+=`<button class="btn" onclick="nextQ()" ${!answered?'disabled':''}>${current===questions.length-1?'결과 보기':'다음'}</button>`;
  html+=`</div></div>`;
  document.getElementById('questionArea').innerHTML=html;
}

function selectChoice(i){
  const q=questions[current];
  if(q.type==='multi'){
    let arr=answers[current]||[];
    if(arr.includes(i)) arr=arr.filter(v=>v!==i);
    else{if(arr.length>=(q.max||99)){alert(`최대 ${q.max}개까지 선택할 수 있어요.`);return}arr=[...arr,i]}
    answers[current]=arr;
  }else{answers[current]=i}
  renderQ();
}
function prevQ(){if(current>0){current--;renderQ()}}
function nextQ(){if(current<questions.length-1){current++;renderQ()}else showResult()}

// CLAUDE: 태그 기반 점수 집계 및 유형 매칭
function showResult(){
  const scores={};
  answers.forEach((ans,qi)=>{
    const q=questions[qi];
    const sel=Array.isArray(ans)?ans:(ans!==null&&ans!==undefined?[ans]:[]);
    sel.forEach(i=>{
      if(q.c[i]) Object.entries(q.c[i].s||{}).forEach(([tag,val])=>scores[tag]=(scores[tag]||0)+val);
    });
  });
  const best=Object.entries(types)
    .map(([key,t])=>({key,...t,score:t.tags.reduce((sum,tag)=>sum+(scores[tag]||0),0)}))
    .sort((a,b)=>b.score-a.score)[0];
  // CLAUDE: 닉네임 + 선택 답변 + 결과 유형 구글 시트 전송
  const answerLabels=questions.map((q,qi)=>{
    const ans=answers[qi];
    if(ans===null||ans===undefined) return '';
    if(Array.isArray(ans)) return ans.map(i=>q.c[i]?.label||'').join(', ');
    return q.c[ans]?.label||'';
  });
  fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nickname:userNickname,date:new Date().toLocaleString('ko-KR'),result:best.name,answers:answerLabels})
  }).catch(()=>{});
  renderResult(best,scores);
}

// CODEX: CLAUDE 결과에는 4축 성향 분석 바가 빠져 있어 태그 점수 기반으로 좌우 비율을 복원합니다.
function sumTags(scores,tags){return tags.reduce((sum,tag)=>sum+(scores[tag]||0),0)}
function axisScores(scores){
  const axes=[
    {title:'Classic ↔ Glam',leftName:'Classic · 여왕형',rightName:'Glam · 스타형',left:'Classic',right:'Glam',lTags:['classic','queen','silk','elegant'],rTags:['glam','star','silver','glitter','beads']},
    {title:'Romantic ↔ Modern',leftName:'Romantic · 첫사랑형',rightName:'Modern · 패션형',left:'Romantic',right:'Modern',lTags:['romance','pure','flower','organza'],rTags:['fashion','hline','mermaid','deepv']},
    {title:'Princess ↔ Slim',leftName:'Princess · 풍성',rightName:'Slim · 슬림',left:'Princess',right:'Slim',lTags:['princess','bell','aline','top'],rTags:['mermaid','hline','deepv']},
    {title:'Flower ↔ Beads',leftName:'Flower · 플라워',rightName:'Beads · 비즈',left:'Flower',right:'Beads',lTags:['flower','organza','romance'],rTags:['beads','silver','glitter']}
  ];
  return axes.map(ax=>{
    const l=sumTags(scores,ax.lTags),r=sumTags(scores,ax.rTags),total=l+r||1;
    const lp=Math.round(l/total*100),rp=100-lp;
    return {...ax,lp,rp};
  });
}
function axisBar(ax){
  const fill=ax.lp>=ax.rp
    ? `<div class="axis-fill-left" style="width:${ax.lp}%"></div>`
    : `<div class="axis-fill-right" style="left:${ax.lp}%;width:${ax.rp}%"></div>`; // CLAUDE: right:0 → left:lp% 로 변경
  return `<div class="axis-card"><div class="axis-title">${ax.title}</div><div class="axis-head"><div><div class="axis-pct">${ax.lp}%</div><div class="axis-name">${ax.leftName}</div></div><div style="text-align:right"><div class="axis-pct">${ax.rp}%</div><div class="axis-name">${ax.rightName}</div></div></div><div class="axis-track">${fill}</div><div class="axis-foot"><span class="axis-code">${ax.left}</span><span class="axis-code">${ax.right}</span></div></div>`;
}

// CODEX: CLAUDE 결과에는 추천 홀/소재/실루엣이 별도 표시되지 않아 타입 태그에서 대표 항목을 뽑습니다.
function pickFirst(tags,candidates,fallback){return candidates.find(tag=>tags.includes(tag))||fallback}
function resultDetails(best){
  const hall=pickFirst(best.tags,['hotel','darkhall','brighthall','chapel'],'brighthall');
  const materialTags=best.tags.filter(tag=>['silk','organza','beads','flower','silver','glitter'].includes(tag)).slice(0,2);
  const silhouette=pickFirst(best.tags,['bell','aline','mermaid','hline'],'aline');
  return {
    hall:tagLabels[hall]||hall,
    material:materialTags.map(tag=>tagLabels[tag]||tag).join(' · ')||'취향 맞춤 소재',
    silhouette:tagLabels[silhouette]||silhouette
  };
}
function shopFit(best,i){
  const top=Math.min(99,Math.max(90,72+(best.score||0)));
  return Math.max(80,top-(i*5));
}

// CLAUDE: 업체 카드 — 기존 shopCard 함수에서 shops 오브젝트로 링크 연결
// CODEX: CLAUDE 결과에는 샵별 적합도 %가 없어 fit 인자를 추가했습니다.
function shopCard(name,rank,fit){
  const s=shops[name]||{};
  let links='';
  if(s.home) links+=`<a class="linkbtn" target="_blank" href="${s.home}">공식 홈페이지</a>`;
  if(s.insta) links+=`<a class="linkbtn insta" target="_blank" href="${s.insta}">공식 인스타그램</a>`;
  return `<div class="shop"><div class="shop-top"><div><div class="rank">${rank}</div><div class="shop-name">${name}</div></div><div class="shop-fit">${fit}%</div></div><div class="links">${links||'<span class="small">공식 채널 확인 중</span>'}</div></div>`;
}

function renderResult(best,scores){
  document.getElementById('test').style.display='none';
  const topTags=best.tags.slice(0,6).map(t=>`<span class="tag">${tagLabels[t]||t}</span>`).join('');
  const detail=resultDetails(best);
  const bars=axisScores(scores).map(axisBar).join('');
  const shopHtml=best.shops.map((name,i)=>shopCard(name,`TOP ${i+1}`,shopFit(best,i))).join('');
  document.getElementById('result').className='result show';
  // CLAUDE: 결과 카드 헤더에 유형 이미지 표시 (img 필드 없으면 이미지 영역 생략)
  document.getElementById('result').innerHTML=`<div class="result-card"><div class="result-header"><div class="result-header-text">${userNickname?`<div class="mood" style="color:#b05f83;font-size:15px;margin-bottom:4px">${userNickname}님의 드레스 유형</div>`:''}<div class="mood">${best.mood}</div><div class="type-name">${best.name}</div><p class="desc">${best.desc}</p></div>${best.img?`<img class="result-img" src="${best.img}" alt="${best.name}">`:''}</div><div class="result-meta"><span class="tag">추천 홀: ${detail.hall}</span><span class="tag">추천 소재: ${detail.material}</span><span class="tag">추천 실루엣: ${detail.silhouette}</span></div><div class="dna-section"><div class="dna-title">나의 드레스 DNA</div><div class="tags">${topTags}</div></div><h3>4축 성향 분석</h3><div class="bars">${bars}</div><h3>추천 드레스샵 TOP3</h3><div class="shops">${shopHtml}</div><div class="footer-actions"><button class="btn" onclick="location.reload()">다시 테스트하기</button><button class="btn secondary" onclick="saveImage(event)">이미지 저장</button></div><p class="small">결과는 취향 기반 추천이며, 실제 피팅 결과·예식장 조명·체형·예산에 따라 달라질 수 있어요.</p></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* CLAUDE: html2canvas로 결과 카드를 PNG로 저장 */
function saveImage(e){
  // CODEX: CLAUDE 오류 — 전역 event.target 사용, CDN 미확인으로 저장 버튼이 터질 수 있었음
  // CODEX 수정: 파라미터 e로 받고, html2canvas 가용성 체크, .result-card null 체크 추가
  const btn=e?.currentTarget||e?.target;
  if(!btn) return;
  if(typeof html2canvas!=='function'){alert('이미지 저장 기능을 불러오지 못했어요. 네트워크 연결을 확인해 주세요.');return}
  btn.textContent='저장 중...';btn.disabled=true;
  const card=document.querySelector('.result-card');
  if(!card){btn.textContent='이미지 저장';btn.disabled=false;return}
  html2canvas(card,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(canvas=>{
    const a=document.createElement('a');
    a.download='wedding-dress-type.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
    btn.textContent='이미지 저장';btn.disabled=false;
  }).catch(()=>{btn.textContent='이미지 저장';btn.disabled=false;});
}
